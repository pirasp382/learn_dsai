version: "3.8"

services:
  frontend:
    build: ./frontend
    container_name: frontend_container
    ports:
      - "3001:3000"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: backend_container
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1